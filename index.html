      border: 1px solid rgba(255, 255, 255, 0.35);
      border-radius: 28px;
      padding: 44px 36px 36px;
      max-width: 440px;
      width: 100%;
      text-align: center;
      box-shadow: 0 12px 40px rgba(0, 0, 60, 0.35);

      font-size: 12px;
      letter-spacing: 0.2em;
      opacity: 0.75;
      margin-bottom: 6px;
    }

    .title {
      font-size: 19px;
      font-weight: bold;
      margin-bottom: 32px;
      line-height: 1.5;
    }

    #visual-container {

    }

    .emoji {
      font-size: 58px;
      display: block;
      filter: drop-shadow(0 4px 8px rgba(0,0,40,0.25));
    }

    #wiki-image {
      display: none;
      width: 200px;
      height: 200px;
      object-fit: cover;
      border-radius: 16px;
      box-shadow: 0 6px 20px rgba(0, 0, 60, 0.4);
      margin: 0 auto;
    }

      font-size: 36px;
      font-weight: bold;
      margin-bottom: 22px;
      line-height: 1.25;
      text-shadow: 0 2px 10px rgba(0,0,60,0.3);
    }

    .divider {
      border: none;
      border-top: 1px solid rgba(255,255,255,0.3);
      margin: 22px 0;
    }

    .description {
      font-size: 15px;
      line-height: 1.85;
      opacity: 0.93;
      margin-bottom: 16px;
    }

    .map-btn {

      margin-top: 16px;
      padding: 10px 22px;
      background: rgba(255, 255, 255, 0.2);
      border: 1px solid rgba(255, 255, 255, 0.45);
      border-radius: 100px;
      color: #fff;
      text-decoration: none;
      font-size: 14px;
      transition: background 0.2s;
    }

    .map-btn:hover {
      background: rgba(255, 255, 255, 0.32);
    }

      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      margin-bottom: 28px;
      font-size: 13px;
      opacity: 0.85;
    }

    .color-dot {
      width: 14px;
      height: 14px;
      border-radius: 50%;
      border: 2px solid rgba(255,255,255,0.7);
      display: inline-block;
      flex-shrink: 0;
    }

    .note {
      font-size: 11px;
      opacity: 0.55;
      letter-spacing: 0.05em;
      margin-top: 20px;

      return new Intl.DateTimeFormat("ja-JP", {
        timeZone: "Asia/Tokyo",
        year: "numeric", month: "2-digit", day: "2-digit"
      }).format(new Date());
    }

    function pickPlace() {
      const r = Math.random() * 100;
      let cumulative = 0;
      for (const island of islands) {
        cumulative += island.weight;
        if (r < cumulative) return island;
      }
      return others[Math.floor(Math.random() * others.length)];
    }

    function loadOrPick() {
      const today = todayJST();
      try {
        const saved = JSON.parse(localStorage.getItem(STORAGE_KEY));
        if (saved?.date === today) {
          const list = saved.type === "island" ? islands : others;
          return { place: list[saved.index], isRepeat: true };
        }
      } catch {}

      const place = pickPlace();
      const type = islands.includes(place) ? "island" : "other";
      const list = type === "island" ? islands : others;
      localStorage.setItem(STORAGE_KEY, JSON.stringify({
        date: today,
        type,
        index: list.indexOf(place)
      }));
      return { place, isRepeat: false };
    }

    async function fetchWikiImage(title) {
      try {
        const res = await fetch(
          `https://ja.wikipedia.org/api/rest_v1/page/media-list/${encodeURIComponent(title)}`
        );
        const data = await res.json();
        const images = (data.items || []).filter(item => {
          if (item.type !== "image") return false;
          if (!item.srcset || item.srcset.length === 0) return false;
          const src = item.srcset[0].src || "";
          return !src.includes(".svg");
        });
        if (images.length === 0) return null;
        const picked = images[Math.floor(Math.random() * images.length)];
        const best = picked.srcset[picked.srcset.length - 1];
        const src = best.src;
        return src.startsWith("//") ? "https:" + src : src;
      } catch {
        return null;
      }
    }

    async function init() {
      applyLuckyColor();
      const { place, isRepeat } = loadOrPick();

      document.getElementById("emoji").textContent = place.emoji;
      document.getElementById("place-name").textContent = place.name;
      document.getElementById("description").textContent = place.desc;
      document.getElementById("note").textContent =
        (isRepeat ? "今日はすでに開封済み ― " : "") + place.note;

      if (place.map) {
        const btn = document.getElementById("map-btn");
        btn.href = `https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(place.map)}`;
        btn.style.display = "inline-block";
      }

      if (place.wiki) {
        const imgUrl = await fetchWikiImage(place.wiki);
        if (imgUrl) {
          const img = document.getElementById("wiki-image");
          img.src = imgUrl;
          img.style.display = "block";
          document.getElementById("emoji").style.display = "none";
        }
      }
    }

    init();
  </script>
</body>
</html>
